<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/forgot-style.css') }}">
</head>
<body>
  <div class="forgot-container" id="forgotBox">
    <h2>Forgot Password</h2>
    <form id="forgotForm" action="{{ url_for('request_password_reset') }}" method="POST">
      <label for="email">Enter your registered email:</label>
      <input type="email" id="email" name="email" placeholder="Enter your Email" required>
      <span id="message"></span>
      <button type="submit" id="resetBtn" disabled>Send Reset Link</button>
    </form>
  </div>

  <script>
    const forgotForm = document.getElementById('forgotForm');
    const forgotBox = document.getElementById('forgotBox');
    const emailInput = document.getElementById('email');
    // Note: We remove the simulated 'existingEmails' array

    // Enable the button as the user types
    emailInput.addEventListener('input', () => {
        const resetBtn = document.getElementById('resetBtn');
        if (emailInput.value.trim() !== "") {
            resetBtn.disabled = false;
        } else {
            resetBtn.disabled = true;
        }
    });

    forgotForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const messageSpan = document.getElementById('message');

        fetch(this.action, {
            method: 'POST',
            body: new FormData(this)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // If successful, replace the form with a confirmation message
                forgotBox.innerHTML = `
                    <h2>Check Your Email</h2>
                    <p>${data.message}</p>
                    <button onclick="window.location.href='{{ url_for('login') }}'" class="login-btn">Back to Login</button>
                `;
            } else {
                // If not successful, show the error message above the input
                messageSpan.textContent = data.message;
                messageSpan.style.color = 'red';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            messageSpan.textContent = 'A network error occurred. Please try again.';
            messageSpan.style.color = 'red';
        });
    });
</script>
</body>
</html>
