<!DOCTYPE html>
<html lang="en">
<body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color: #f4f4f4;">
    <div style="max-width: 600px; margin: 50px auto; padding: 30px; background-color: #ffffff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center;">
        <h2 style="color: #333333; margin-bottom: 20px;">Welcome, {{ name }}!</h2>
        <p style="color: #555555; font-size: 16px; line-height: 1.5; margin-bottom: 30px;">
            Please click the button below to set your password. This link is valid for 24 hours.
        </p>
        <a href="{{ reset_link }}" style="display: inline-block; padding: 12px 25px; background-color: #007bff; color: #ffffff; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 16px;">
            Set Your Password
        </a>
        <p style="color: #888888; font-size: 14px; margin-top: 25px;">
            If you did not request this, please ignore this email.
        </p>
    </div>
</body>
</html>
