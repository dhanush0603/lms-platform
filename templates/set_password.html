<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/set-pass-style.css') }}">

    <style>
        .password-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none; /* Prevents text selection on repeated clicks */
            font-weight: 600;
            font-size: 14px;
            color: #667eea;
        }
    </style>
    </head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Set Your Password</h2>
            <form id="setPasswordForm" action="{{ url_for('process_set_password') }}" method="POST">
                <input type="hidden" name="token" value="{{ token }}">
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="New Password" required>
                    <span class="toggle-password" onclick="togglePasswordVisibility('password')">Show</span>
                </div>
                <span class="info-text">Password must be at least 15 characters, include 1 uppercase, 1 lowercase, 1 number, and 1 symbol</span>

                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm Password" required>
                    <span class="toggle-password" onclick="togglePasswordVisibility('confirmPassword')">Show</span>
                </div>
                <span class="error-text" id="matchError" style="display:none;">Passwords do not match</span>
                <button type="submit" class="btn">Set Password</button>
            </form>
            <p>Remembered your password? <a href="{{ url_for('login') }}">Login here</a></p>
        </div>
    </div>

    <script>
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const matchError = document.getElementById('matchError');
    const form = document.getElementById('setPasswordForm');

    // --- NEW: Password Regex for JavaScript ---
    const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{15,}$/;

    confirmPasswordInput.addEventListener('input', () => {
        if (passwordInput.value !== confirmPasswordInput.value) {
            matchError.textContent = 'Passwords do not match';
            matchError.style.display = 'block';
            confirmPasswordInput.classList.add('input-error');
        } else {
            matchError.style.display = 'none';
            confirmPasswordInput.classList.remove('input-error');
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault(); 

        // --- NEW: Check password complexity before submitting ---
        if (!passwordRegex.test(passwordInput.value)) {
            matchError.textContent = 'Password does not meet the requirements.';
            matchError.style.display = 'block';
            return;
        }

        if (passwordInput.value !== confirmPasswordInput.value) {
            matchError.textContent = 'Passwords do not match';
            matchError.style.display = 'block';
            return; 
        }

        const formData = new FormData(form);
        const response = await fetch(form.action, {
            method: 'POST',
            body: formData
        });

        const result = await response.json(); 

        if (result.success) { 
            window.location.href = "{{ url_for('login') }}"; 
        } else {
            matchError.textContent = result.error;
            matchError.style.display = 'block';
        }
    });

    function togglePasswordVisibility(inputId) {
            const passwordInput = document.getElementById(inputId);
            const toggleIcon = passwordInput.nextElementSibling; // The <span> eye icon

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleIcon.textContent = "Hide";
            } else {
                passwordInput.type = "password";
                toggleIcon.textContent = "Show";
            }
        }

</script>
</body>
</html>
